<!DOCTYPE html>
<html lang="en">
  <!-- HEAD -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediumX</title>
    <link rel="stylesheet" href="../Css/styles.css" />
  </head>

  <!-- BODY -->
  <body>
    <header class="header">
      <nav class="nav">
        <!-- app icon -->
        <div class="nav__icon">
          <!-- CUSTOM HTML FROM JS -->
          <app-icon></app-icon>
        </div>

        <!-- NAV ITEMS -->
        <ul class="nav__items">
          <li class="nav__item nav__item--story">Our story</li>
          <li class="nav__item nav__item--membership">Membership</li>
          <!-- <li class="nav__item nav__item--write">Write</li> -->
          <li class="nav__item nav__item--sign-in">Sign in</li>
          <button type="button" class="nav__item nav__item--get-started">
            Get Started
          </button>
        </ul>
      </nav>
    </header>

    <!-- FEEDBACK -->
    <div class="feedback"></div>

    <!-- MAIN CONTAINER -->
    <main class="main">
      <div class="main__left-sidebar">
        <h1>Human</h1>
        <h1>stories & ideas</h1>
        <p>A place to read, write, and deepen your understanding</p>
        <button type="button" class="main__left-sidebar--write-btn">
          Write
        </button>
      </div>

      <figure class="main__right-sidebar">
        <img
          src="../Assets/images/medium-image.webp"
          alt="Nature-index-page-Image"
          class="main__right-sidebar-img"
        />
      </figure>
    </main>
    <!-- Modal -->
    <!-- Social authentication inserted through Js -->
    <div class="auth-container">
      <div class="auth-modal auth-modal--hide"></div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer__item"><a href="#">Help</a></div>
      <div class="footer__item"><a href="#">Status</a></div>
      <div class="footer__item"><a href="#">About</a></div>
      <div class="footer__item"><a href="#">Careers</a></div>
      <div class="footer__item"><a href="#">Press</a></div>
      <div class="footer__item"><a href="#">Blog</a></div>
      <div class="footer__item"><a href="#">Privacy</a></div>
      <div class="footer__item"><a href="#">Text to speech</a></div>
      <div class="footer__item"><a href="#">Teams</a></div>
    </footer>
    <!-- <script src="../Js/shared/Components/custom_html_svg_icons.js"></script> -->
    <script src="../Js/script.js" type="module"></script>
  </body>
</html>
